name: Daily MA Screener

on:
  schedule:
    # 每天 14:00 台灣時間（UTC+8 → 06:00 UTC），週一至週五
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '截止日期 YYYY-MM-DD（空白 = 最新）'
        required: false
        default: ''
      preview:
        description: 'Preview 模式：只跑前 N 檔（0 = 全量）'
        required: false
        default: '0'

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          PREVIEW="${{ github.event.inputs.preview || '0' }}"

          ARGS=""
          [ -n "$DATE_ARG" ] && ARGS="$ARGS --date $DATE_ARG"
          [ "$PREVIEW" -gt "0" ] 2>/dev/null && ARGS="$ARGS --preview $PREVIEW"

          python screener.py $ARGS

      - name: Send email report
        if: success()
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          CSV=$(ls -t output/screener_*.csv 2>/dev/null | head -1)
          if [ -n "$CSV" ]; then
            python send_email.py "$CSV"
          else
            echo "No CSV found, skipping email"
          fi

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-${{ github.run_number }}
          path: output/
          retention-days: 90

      - name: Commit & push results to repo
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || \
            git commit -m "📊 screener $(date +'%Y-%m-%d 14:00 CST') [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
